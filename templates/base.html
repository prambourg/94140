<!-- templates/base.html -->

<!DOCTYPE html>
<html>

<head>
    {% if config.ENVIRONMENT == 'prod' %}
        <!-- Google tag (gtag.js) -->
        <script async src="https://www.googletagmanager.com/gtag/js?id={{ config.ANALYTICS_ID }}"></script>
        <script>
          window.dataLayer = window.dataLayer || [];
          function gtag(){dataLayer.push(arguments);}
          gtag('js', new Date());

          gtag('config', '{{ config.ANALYTICS_ID }}');
        </script>
    {% endif %}
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %}{{ gettext('Home - Flask/VueJS/AWS') }}{% endblock %}</title>
    <link rel="icon" href="{{ url_for('static', filename='favicon.ico') }}">
    <link
        rel="stylesheet"
        href="https://cdn.jsdelivr.net/npm/bulma@1.0.2/css/bulma.min.css"
    >
    <script src="{{ config.FONT_AWESOME_URL }}" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/vue/dist/vue.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    <link href="https://fonts.googleapis.com/css?family=Open+Sans:300,400,600,700" rel="stylesheet">
    <script src="{{ url_for('static', filename='index.js') }}" defer></script>
    {% block head %}
    {% endblock %}
</head>

<body class="d-flex flex-column min-vh-100"> <!-- Flexbox applied here -->
    <div id="app" class="d-flex flex-column flex-grow-1">
        <header>
            <my-nav-bar :site="{{ site }}" :navbar="{{ navbar }}"></my-nav-bar>
        </header>
        <main class="flex-grow-1">
            {% block content %}{% endblock %}
        </main>
        <footer class="mt-auto bg-success text-light">
            {% block footer %}
            <my-footer :version="{{ site }}" :owner="{{ owner }}"></my-footer>
            {% endblock %}
        </footer>
    </div>
</body>
</html>
